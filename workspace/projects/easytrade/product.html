<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تفاصيل المنتج - EasyTrade">
    <title>تفاصيل المنتج - EasyTrade</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">🛒 EasyTrade</a>
            <nav class="nav">
                <a href="index.html">الرئيسية</a>
                <a href="cart.html" class="cart-link">
                    سلة التسوق
                    <span id="cart-badge" class="cart-badge">0</span>
                </a>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="container">
            <div id="product-detail" class="product-detail">
                <!-- Generated by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 EasyTrade - جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Get product ID from URL
        function getProductIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
            
            const productId = getProductIdFromUrl();
            
            if (!productId) {
                window.location.href = '404.html';
                return;
            }
            
            const product = getProductById(productId);
            
            if (!product) {
                window.location.href = '404.html';
                return;
            }
            
            renderProductDetail(product);
        });

        // Render product detail
        function renderProductDetail(product) {
            const container = document.getElementById('product-detail');
            container.textContent = '';
            
            // Image
            const imgDiv = document.createElement('div');
            imgDiv.className = 'product-detail-image';
            imgDiv.textContent = product.image;
            container.appendChild(imgDiv);
            
            // Info container
            const infoDiv = document.createElement('div');
            infoDiv.className = 'product-detail-info';
            
            // Category
            const catDiv = document.createElement('div');
            catDiv.className = 'product-detail-category';
            catDiv.textContent = product.categoryName;
            infoDiv.appendChild(catDiv);
            
            // Name
            const nameEl = document.createElement('h1');
            nameEl.textContent = product.name;
            infoDiv.appendChild(nameEl);
            
            // Price
            const priceEl = document.createElement('div');
            priceEl.className = 'product-detail-price';
            priceEl.textContent = formatPrice(product.price);
            infoDiv.appendChild(priceEl);
            
            // Description
            const descEl = document.createElement('p');
            descEl.className = 'product-detail-description';
            descEl.textContent = product.description;
            infoDiv.appendChild(descEl);
            
            // Quantity control
            const qtyDiv = document.createElement('div');
            qtyDiv.className = 'quantity-control';
            
            const label = document.createElement('label');
            label.textContent = 'الكمية:';
            qtyDiv.appendChild(label);
            
            const minusBtn = document.createElement('button');
            minusBtn.type = 'button';
            minusBtn.className = 'quantity-btn';
            minusBtn.textContent = '−';
            minusBtn.onclick = decreaseQuantity;
            qtyDiv.appendChild(minusBtn);
            
            const qtyInput = document.createElement('input');
            qtyInput.type = 'number';
            qtyInput.id = 'quantity';
            qtyInput.value = '1';
            qtyInput.min = '1';
            qtyInput.max = '99';
            qtyDiv.appendChild(qtyInput);
            
            const plusBtn = document.createElement('button');
            plusBtn.type = 'button';
            plusBtn.className = 'quantity-btn';
            plusBtn.textContent = '+';
            plusBtn.onclick = increaseQuantity;
            qtyDiv.appendChild(plusBtn);
            
            infoDiv.appendChild(qtyDiv);
            
            // Add to cart button
            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-primary btn-block';
            addBtn.textContent = 'إضافة للسلة';
            addBtn.onclick = function() { handleAddToCart(product.id); };
            infoDiv.appendChild(addBtn);
            
            container.appendChild(infoDiv);
        }

        // Quantity controls
        function increaseQuantity() {
            const input = document.getElementById('quantity');
            const value = parseInt(input.value, 10) || 1;
            if (value < 99) {
                input.value = value + 1;
            }
        }

        function decreaseQuantity() {
            const input = document.getElementById('quantity');
            const value = parseInt(input.value, 10) || 1;
            if (value > 1) {
                input.value = value - 1;
            }
        }

        // Handle add to cart
        function handleAddToCart(productId) {
            const quantity = parseInt(document.getElementById('quantity').value, 10) || 1;
            
            if (quantity < 1 || quantity > 99) {
                alert('الكمية غير صحيحة');
                return;
            }
            
            addToCart(productId, quantity);
            updateCartBadge();
            alert('تمت إضافة المنتج للسلة!');
        }
    </script>
</body>
</html>

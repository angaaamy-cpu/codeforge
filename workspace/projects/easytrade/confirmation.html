<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تأكيد الطلب - EasyTrade">
    <title>تم بنجاح - EasyTrade</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">🛒 EasyTrade</a>
            <nav class="nav">
                <a href="index.html">الرئيسية</a>
                <a href="cart.html" class="cart-link">
                    سلة التسوق
                    <span id="cart-badge" class="cart-badge">0</span>
                </a>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="container">
            <div class="confirmation">
                <div class="confirmation-icon">✓</div>
                <h1>شكراً لك!</h1>
                <p>تم استلام طلبك بنجاح</p>
                
                <div id="order-details" class="order-details">
                    <!-- Generated by JavaScript -->
                </div>
                
                <p>سنتواصل معك قريباً لتأكيد الطلب</p>
                
                <a href="index.html" class="btn btn-primary mt-4">العودة للتسوق</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 EasyTrade - جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
            
            const orderNumber = sessionStorage.getItem('lastOrderNumber');
            const orderTotal = sessionStorage.getItem('lastOrderTotal');
            
            const detailsContainer = document.getElementById('order-details');
            detailsContainer.textContent = '';
            
            if (orderNumber) {
                const orderDiv = document.createElement('div');
                orderDiv.className = 'order-number';
                orderDiv.textContent = orderNumber;
                detailsContainer.appendChild(orderDiv);
                
                const totalP = document.createElement('p');
                totalP.textContent = 'المبلغ الإجمالي: ' + formatPrice(parseFloat(orderTotal || '0'));
                detailsContainer.appendChild(totalP);
            } else {
                const msgP = document.createElement('p');
                msgP.textContent = 'لا توجد تفاصيل للطلب';
                detailsContainer.appendChild(msgP);
            }
        });
    </script>
    
    <style>
        .order-details {
            margin: 1.5rem 0;
        }
    </style>
</body>
</html>

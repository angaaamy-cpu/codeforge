<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EasyTrade - منصة تجارة إلكترونية بسيطة">
    <title>EasyTrade - تسوق بسهولة</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">🛒 EasyTrade</a>
            <nav class="nav">
                <a href="index.html">الرئيسية</a>
                <a href="cart.html" class="cart-link">
                    سلة التسوق
                    <span id="cart-badge" class="cart-badge">0</span>
                </a>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="container">
            <!-- Search & Filter -->
            <div class="search-filter">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="ابحث عن منتج..."
                        autocomplete="off"
                    >
                </div>
                <div class="filter-buttons" id="filter-buttons">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Products Grid -->
            <div id="products-grid" class="products-grid">
                <!-- Generated by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 EasyTrade - جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Current filter state
        let currentCategory = 'all';
        let currentSearch = '';

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
            renderFilters();
            renderProducts();
            
            // Search handler
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', function(e) {
                currentSearch = e.target.value;
                renderProducts();
            });
        });

        // Render filter buttons
        function renderFilters() {
            const container = document.getElementById('filter-buttons');
            container.textContent = '';
            
            CATEGORIES.forEach(function(category) {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (category.id === 'all' ? ' active' : '');
                btn.textContent = category.name;
                btn.dataset.category = category.id;
                btn.addEventListener('click', function() {
                    currentCategory = category.id;
                    document.querySelectorAll('.filter-btn').forEach(function(b) {
                        b.classList.remove('active');
                    });
                    btn.classList.add('active');
                    renderProducts();
                });
                container.appendChild(btn);
            });
        }

        // Render products
        function renderProducts() {
            const container = document.getElementById('products-grid');
            container.textContent = '';
            
            // Filter products
            let filtered = PRODUCTS;
            
            // Apply category filter
            if (currentCategory !== 'all') {
                filtered = filtered.filter(function(p) {
                    return p.category === currentCategory;
                });
            }
            
            // Apply search filter
            if (currentSearch.trim() !== '') {
                const q = currentSearch.toLowerCase().trim();
                filtered = filtered.filter(function(p) {
                    return p.name.toLowerCase().includes(q) ||
                           p.nameEn.toLowerCase().includes(q) ||
                           p.description.toLowerCase().includes(q);
                });
            }
            
            // Check if no results
            if (filtered.length === 0) {
                container.textContent = '';
                const msg = document.createElement('p');
                msg.className = 'text-center';
                msg.style.cssText = 'grid-column: 1/-1; padding: 2rem;';
                msg.textContent = 'لم يتم العثور على منتجات';
                container.appendChild(msg);
                return;
            }
            
            // Render product cards
            filtered.forEach(function(product) {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                // Product image (emoji is safe)
                const imgDiv = document.createElement('div');
                imgDiv.className = 'product-image';
                imgDiv.textContent = product.image;
                card.appendChild(imgDiv);
                
                // Category
                const catDiv = document.createElement('div');
                catDiv.className = 'product-category';
                catDiv.textContent = product.categoryName;
                card.appendChild(catDiv);
                
                // Name
                const nameEl = document.createElement('h3');
                nameEl.className = 'product-name';
                nameEl.textContent = product.name;
                card.appendChild(nameEl);
                
                // Description
                const descEl = document.createElement('p');
                descEl.className = 'product-description';
                descEl.textContent = product.description;
                card.appendChild(descEl);
                
                // Price
                const priceEl = document.createElement('div');
                priceEl.className = 'product-price';
                priceEl.textContent = formatPrice(product.price);
                card.appendChild(priceEl);
                
                // Actions
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'product-actions';
                
                const link = document.createElement('a');
                link.href = 'product.html?id=' + product.id;
                link.className = 'btn btn-secondary btn-sm';
                link.textContent = 'التفاصيل';
                actionsDiv.appendChild(link);
                
                const btn = document.createElement('button');
                btn.className = 'btn btn-primary btn-sm';
                btn.textContent = 'إضافة للسلة';
                btn.onclick = function() { handleAddToCart(product.id); };
                actionsDiv.appendChild(btn);
                
                card.appendChild(actionsDiv);
                container.appendChild(card);
            });
        }

        // Handle add to cart
        function handleAddToCart(productId) {
            addToCart(productId);
            updateCartBadge();
            // Visual feedback
            alert('تمت إضافة المنتج للسلة!');
        }
    </script>
</body>
</html>

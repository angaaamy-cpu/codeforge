<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="سلة التسوق - EasyTrade">
    <title>سلة التسوق - EasyTrade</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">🛒 EasyTrade</a>
            <nav class="nav">
                <a href="index.html">الرئيسية</a>
                <a href="cart.html" class="cart-link">
                    سلة التسوق
                    <span id="cart-badge" class="cart-badge">0</span>
                </a>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="container cart-page">
            <h1 class="mb-4">سلة التسوق</h1>
            
            <div id="cart-content">
                <!-- Generated by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 EasyTrade - جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
            renderCart();
        });

        // Render cart
        function renderCart() {
            const container = document.getElementById('cart-content');
            const cartDetails = getCartDetails();
            container.textContent = '';
            
            if (cartDetails.items.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'cart-empty';
                
                const iconDiv = document.createElement('div');
                iconDiv.className = 'cart-empty-icon';
                iconDiv.textContent = '🛒';
                emptyDiv.appendChild(iconDiv);
                
                const title = document.createElement('h2');
                title.textContent = 'السلة فارغة';
                emptyDiv.appendChild(title);
                
                const msg = document.createElement('p');
                msg.textContent = 'لم تضف أي منتجات للسلة بعد';
                emptyDiv.appendChild(msg);
                
                const link = document.createElement('a');
                link.href = 'index.html';
                link.className = 'btn btn-primary mt-3';
                link.textContent = 'تصفح المنتجات';
                emptyDiv.appendChild(link);
                
                container.appendChild(emptyDiv);
                return;
            }
            
            // Cart items container
            const itemsDiv = document.createElement('div');
            itemsDiv.className = 'cart-items';
            
            cartDetails.items.forEach(function(item) {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                
                // Image
                const imgDiv = document.createElement('div');
                imgDiv.className = 'cart-item-image';
                imgDiv.textContent = item.image;
                itemDiv.appendChild(imgDiv);
                
                // Info
                const infoDiv = document.createElement('div');
                infoDiv.className = 'cart-item-info';
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'cart-item-name';
                nameDiv.textContent = item.name;
                infoDiv.appendChild(nameDiv);
                
                const priceDiv = document.createElement('div');
                priceDiv.className = 'cart-item-price';
                priceDiv.textContent = formatPrice(item.price);
                infoDiv.appendChild(priceDiv);
                
                itemDiv.appendChild(infoDiv);
                
                // Quantity controls
                const qtyDiv = document.createElement('div');
                qtyDiv.className = 'cart-item-quantity';
                
                const minusBtn = document.createElement('button');
                minusBtn.textContent = '−';
                minusBtn.onclick = function() { handleUpdateQuantity(item.id, -1); };
                qtyDiv.appendChild(minusBtn);
                
                const qtySpan = document.createElement('span');
                qtySpan.textContent = item.quantity;
                qtyDiv.appendChild(qtySpan);
                
                const plusBtn = document.createElement('button');
                plusBtn.textContent = '+';
                plusBtn.onclick = function() { handleUpdateQuantity(item.id, 1); };
                qtyDiv.appendChild(plusBtn);
                
                itemDiv.appendChild(qtyDiv);
                
                // Total
                const totalDiv = document.createElement('div');
                totalDiv.className = 'cart-item-total';
                totalDiv.textContent = formatPrice(item.itemTotal);
                itemDiv.appendChild(totalDiv);
                
                // Remove button
                const removeBtn = document.createElement('div');
                removeBtn.className = 'cart-item-remove';
                removeBtn.textContent = '✕';
                removeBtn.onclick = function() { handleRemoveFromCart(item.id); };
                itemDiv.appendChild(removeBtn);
                
                itemsDiv.appendChild(itemDiv);
            });
            
            container.appendChild(itemsDiv);
            
            // Summary
            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'cart-summary';
            
            // Item count
            const row1 = document.createElement('div');
            row1.className = 'cart-summary-row';
            row1.appendChild(createSummaryCell('عدد المنتجات'));
            row1.appendChild(createSummaryCell(String(cartDetails.itemCount)));
            summaryDiv.appendChild(row1);
            
            // Subtotal
            const row2 = document.createElement('div');
            row2.className = 'cart-summary-row';
            row2.appendChild(createSummaryCell('المجموع'));
            row2.appendChild(createSummaryCell(formatPrice(cartDetails.subtotal)));
            summaryDiv.appendChild(row2);
            
            // Total
            const row3 = document.createElement('div');
            row3.className = 'cart-summary-row';
            row3.appendChild(createSummaryCell('الإجمالي'));
            row3.appendChild(createSummaryCell(formatPrice(cartDetails.total)));
            summaryDiv.appendChild(row3);
            
            function createSummaryCell(text) {
                const span = document.createElement('span');
                span.textContent = text;
                return span;
            }
            
            // Checkout button
            const checkoutBtn = document.createElement('button');
            checkoutBtn.className = 'btn btn-success btn-block mt-3';
            checkoutBtn.textContent = 'إتمام الشراء';
            checkoutBtn.onclick = handleCheckout;
            summaryDiv.appendChild(checkoutBtn);
            
            // Clear cart button
            const clearBtn = document.createElement('button');
            clearBtn.className = 'btn btn-danger btn-block mt-2';
            clearBtn.textContent = 'تفريغ السلة';
            clearBtn.onclick = handleClearCart;
            summaryDiv.appendChild(clearBtn);
            
            container.appendChild(summaryDiv);
        }

        // Handle update quantity
        function handleUpdateQuantity(productId, change) {
            const cart = getCart();
            const item = cart.find(function(i) { return i.id === productId; });
            
            if (item) {
                const newQuantity = item.quantity + change;
                if (newQuantity <= 0) {
                    removeFromCart(productId);
                } else if (newQuantity <= 99) {
                    updateQuantity(productId, newQuantity);
                }
                renderCart();
                updateCartBadge();
            }
        }

        // Handle remove from cart
        function handleRemoveFromCart(productId) {
            if (confirm('هل تريد حذف هذا المنتج من السلة؟')) {
                removeFromCart(productId);
                renderCart();
                updateCartBadge();
            }
        }

        // Handle clear cart
        function handleClearCart() {
            if (confirm('هل تريد تفريغ السلة بالكامل؟')) {
                clearCart();
                renderCart();
                updateCartBadge();
            }
        }

        // Handle checkout
        function handleCheckout() {
            const orderNumber = generateOrderNumber();
            sessionStorage.setItem('lastOrderNumber', orderNumber);
            sessionStorage.setItem('lastOrderTotal', getCartTotal().toString());
            clearCart();
            window.location.href = 'confirmation.html';
        }
    </script>
</body>
</html>

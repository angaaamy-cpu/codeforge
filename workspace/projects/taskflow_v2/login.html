<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - TaskFlow Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container" style="
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 2rem;
    ">
        <div class="card" style="width: 100%; max-width: 400px;">
            <div class="text-center mb-4">
                <div class="logo" style="justify-content: center; font-size: 1.5rem;">
                    <span class="logo-icon">📋</span>
                    <span>TaskFlow Pro</span>
                </div>
                <h2 class="mt-3">تسجيل الدخول</h2>
                <p class="text-muted">أدخل بيانات حسابك للمتابعة</p>
            </div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" class="form-input" 
                           placeholder="example@company.com" required
                           value="ahmed@company.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">كلمة المرور</label>
                    <input type="password" id="password" class="form-input" 
                           placeholder="••••••••" required
                           value="demo123">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    تسجيل الدخول
                </button>
            </form>
            
            <div class="mt-3 text-center">
                <p class="text-muted" style="font-size: 0.85rem;">
                    حسابات تجريبية:<br>
                    👨‍💼 ahmed@company.com (مدير)<br>
                    👩‍💻 sara@company.com (عضو)<br>
                    👁️ أي بريد مع أي كلمة مرور
                </p>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // If already logged in, redirect to dashboard
        if (isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>

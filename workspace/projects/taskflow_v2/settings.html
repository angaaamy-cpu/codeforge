<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - TaskFlow Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="dashboard.html" class="logo">
                    <span class="logo-icon">📋</span>
                    <span>TaskFlow Pro</span>
                </a>
                
                <nav class="header-nav">
                    <a href="dashboard.html" class="nav-link">لوحة التحكم</a>
                    <a href="tasks.html" class="nav-link">المهام</a>
                    <a href="team.html" class="nav-link">الفريق</a>
                    <a href="reports.html" class="nav-link">التقارير</a>
                    <a href="settings.html" class="nav-link active">الإعدادات</a>
                </nav>
                
                <div class="user-menu">
                    <span class="user-avatar">👤</span>
                    <div class="user-info">
                        <span class="user-name">أحمد محمد</span>
                        <span class="user-role">مدير</span>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-content page-transition">
        <div class="container" style="max-width: 800px;">
            <h1 class="mb-4">الإعدادات</h1>
            
            <!-- Appearance -->
            <div class="card mb-4">
                <h3 class="card-title mb-3">المظهر</h3>
                
                <div class="form-group">
                    <label class="form-label" for="setting-theme">السمة</label>
                    <select id="setting-theme" class="form-select" onchange="saveAppearanceSettings()">
                        <option value="dark">داكن</option>
                        <option value="light">فاتح</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="setting-language">اللغة</label>
                    <select id="setting-language" class="form-select" onchange="saveAppearanceSettings()">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>
            
            <!-- Notifications -->
            <div class="card mb-4">
                <h3 class="card-title mb-3">الإشعارات</h3>
                
                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="setting-notifications" checked
                               onchange="saveNotificationSettings()">
                        <span>تفعيل الإشعارات</span>
                    </label>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="setting-email-notifications"
                               onchange="saveNotificationSettings()">
                        <span>إشعارات البريد الإلكتروني</span>
                    </label>
                </div>
            </div>
            
            <!-- Data Management -->
            <div class="card mb-4">
                <h3 class="card-title mb-3">إدارة البيانات</h3>
                
                <div class="flex gap-2" style="flex-wrap: wrap;">
                    <button class="btn btn-secondary" onclick="exportDataAction()">
                        📥 تصدير البيانات
                    </button>
                    <button class="btn btn-warning" onclick="resetDataAction()">
                        🔄 إعادة تعيين البيانات
                    </button>
                </div>
            </div>
            
            <!-- Account -->
            <div class="card">
                <h3 class="card-title mb-3">الحساب</h3>
                
                <div class="mb-3">
                    <div class="text-muted mb-1">الحساب الحالي</div>
                    <div id="current-user-info">أحمد محمد - ahmed@company.com</div>
                </div>
                
                <div class="flex gap-2">
                    <button class="btn btn-danger" onclick="handleLogout()">
                        🚪 تسجيل الخروج
                    </button>
                </div>
            </div>
        </div>
    </main>
    
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!requireAuth()) return;
            
            loadSettings();
            
            // Update user info
            const user = getCurrentUser();
            if (user) {
                document.getElementById('current-user-info').textContent = 
                    `${user.name} - ${user.email}`;
            }
        });
        
        function loadSettings() {
            const settings = getSettings();
            
            document.getElementById('setting-theme').value = settings.theme || 'dark';
            document.getElementById('setting-language').value = settings.language || 'ar';
            document.getElementById('setting-notifications').checked = settings.notifications !== false;
            document.getElementById('setting-email-notifications').checked = settings.emailNotifications === true;
            
            // Apply RTL/LTR
            document.body.dir = settings.language === 'ar' ? 'rtl' : 'ltr';
            document.body.lang = settings.language;
        }
        
        function saveAppearanceSettings() {
            const settings = {
                theme: document.getElementById('setting-theme').value,
                language: document.getElementById('setting-language').value
            };
            
            updateSettings(settings);
            
            // Apply changes
            document.body.dir = settings.language === 'ar' ? 'rtl' : 'ltr';
            document.body.lang = settings.language;
            
            alert('تم حفظ الإعدادات');
        }
        
        function saveNotificationSettings() {
            const settings = {
                notifications: document.getElementById('setting-notifications').checked,
                emailNotifications: document.getElementById('setting-email-notifications').checked
            };
            
            updateSettings(settings);
            alert('تم حفظ إعدادات الإشعارات');
        }
        
        function exportDataAction() {
            const data = exportData();
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'taskflow-data.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function resetDataAction() {
            if (confirm('هل أنت متأكد؟ سيتم حذف جميع البيانات وإعادة تعيينها.')) {
                clearAllData();
                alert('تم إعادة تعيين البيانات');
                window.location.reload();
            }
        }
    </script>
</body>
</html>

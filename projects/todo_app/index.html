<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهامي - Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📝 مهامي</h1>
            <p class="subtitle">نظّم مهامك اليومية</p>
        </header>

        <section class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="task-input" 
                    placeholder="أضف مهمة جديدة..."
                    autocomplete="off"
                >
                <button id="add-btn" class="btn-add">أضف مهمة</button>
            </div>
        </section>

        <section class="stats-section">
            <div class="stat">
                <span class="stat-number" id="total-count">0</span>
                <span class="stat-label">الإجمالي</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="completed-count">0</span>
                <span class="stat-label">المكتملة</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="pending-count">0</span>
                <span class="stat-label">المعلقة</span>
            </div>
        </section>

        <section class="tasks-section">
            <ul id="tasks-list" class="tasks-list">
                <!-- المهام ستُضاف هنا -->
            </ul>
            <div id="empty-state" class="empty-state">
                <p>لا توجد مهام بعد</p>
                <p class="hint">أضف مهمة جديدة للبدء</p>
            </div>
        </section>

        <footer class="footer">
            <button id="clear-completed" class="btn-clear">حذف المكتملة</button>
            <button id="clear-all" class="btn-clear btn-danger">حذف الكل</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
